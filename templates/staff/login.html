<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Login - E-Canteen</title>
    {% load static %}

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
        }

        .bg-blur {
            position: fixed;
            width: 100%;
            height: 100%;
            background: url('{% static "images/food-bg.png" %}') center/cover no-repeat;
            filter: blur(10px);
            z-index: -2;
        }

        .bg-overlay {
            position: fixed;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: -1;
        }

        .login-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
        }

        .login-box {
            width: 100%;
            max-width: 420px;
            padding: 40px;
            border-radius: 20px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            color: white;
            text-align: center;
        }

        .login-box h2 {
            margin-bottom: 25px;
            font-weight: 700;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            margin-top: 5px;
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            border-radius: 30px;
            border: none;
            background: linear-gradient(135deg, #6c757d, #495057);
            color: white;
            font-weight: bold;
        }

        .login-btn:hover {
            transform: translateY(-2px);
        }

        .back-link {
            margin-top: 20px;
        }

        .back-link a {
            color: #ccc;
            text-decoration: none;
        }

    </style>
</head>

<body>

<div class="bg-blur"></div>
<div class="bg-overlay"></div>

<div class="login-wrapper">
    <div class="login-box">

        <h2><i class="fas fa-user-tie"></i> Staff Login</h2>

        {% if error %}
            <div class="alert alert-danger">{{ error }}</div>
        {% endif %}

        <form method="post">
            {% csrf_token %}

            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" required>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" required>
            </div>

            <button class="login-btn">Login</button>
        </form>

        <div class="back-link">
            <a href="{% url 'home' %}">← Back to Home</a>
        </div>

    </div>
</div>

</body>
</html>
