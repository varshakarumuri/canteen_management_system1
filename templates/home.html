{% extends 'base.html' %}

{% load static %}

{% block navbar %}
{% endblock navbar %}

{% block content %}

<!-- Blurred Background -->
<div class="bg-blur"></div>
<div class="bg-overlay"></div>

<!-- Home Container -->
<div class="home-wrapper">
    <div class="home-box">
        
        <!-- Logo -->
        <div class="home-logo">
            <i class="fas fa-utensils"></i> E-Canteen
        </div>

        <!-- Welcome Title -->
        <h1 class="home-title">Welcome to E-Canteen</h1>
        
        <!-- Subtitle -->
        <p class="home-subtitle">Your go-to platform for ordering delicious meals anytime, anywhere.</p>
        
        <!-- Main Action Buttons -->
        <div class="home-buttons">
            <a href="/user/login/" class="home-btn home-btn-primary">
                <i class="fas fa-utensils"></i> EXPLORE MENU
            </a>
            <a href="/user/login/" class="home-btn home-btn-secondary">
                <i class="fas fa-shopping-cart"></i> ORDER NOW
            </a>
        </div>

        <!-- Login Links -->
        <div class="home-links">
            <p>
                <a href="/staff/login/"><i class="fas fa-sign-in-alt"></i> Staff Login</a>
                <span class="divider">•</span>
                <a href="/admin/login/"><i class="fas fa-lock"></i> Admin</a>
            </p>
        </div>

    </div>
</div>


<style>
    /* ========================================
       HOME PAGE - UNIFORM GLASSMORPHISM DESIGN
       Matches login page styling for consistency
       ======================================== */

    body, html {
        margin: 0;
        padding: 0;
        height: 100%;
        font-family: 'Segoe UI', sans-serif;
    }

    /* 🔥 Blurred Background */
    .bg-blur {
        position: fixed;
        width: 100%;
        height: 100%;
        background: url('{% static "images/food-bg.png" %}') center/cover no-repeat;
        filter: blur(10px);
        z-index: -2;
    }

    .bg-overlay {
        position: fixed;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.5);
        z-index: -1;
    }

    /* Home Wrapper - Centered Layout */
    .home-wrapper {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 20px;
    }

    /* 🌟 Glass Container - Matches Login Box */
    .home-box {
        width: 100%;
        max-width: 550px;
        padding: 50px 40px;
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(15px);
        border: 1px solid rgba(255, 255, 255, 0.2);
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        color: white;
        text-align: center;
        animation: slideInDown 0.6s ease;
    }

    /* Logo */
    .home-logo {
        font-size: 2rem;
        font-weight: 700;
        margin-bottom: 20px;
        color: #ffb88c;
        letter-spacing: 1px;
    }

    /* Title */
    .home-title {
        font-size: 2.5rem;
        font-weight: 700;
        margin-bottom: 15px;
        line-height: 1.3;
        color: white;
    }

    /* Subtitle */
    .home-subtitle {
        font-size: 1rem;
        color: rgba(255, 255, 255, 0.9);
        margin-bottom: 35px;
        line-height: 1.6;
        font-weight: 400;
    }

    /* Buttons Container */
    .home-buttons {
        display: flex;
        gap: 15px;
        justify-content: center;
        flex-wrap: wrap;
        margin-bottom: 30px;
    }

    /* Button Styles */
    .home-btn {
        padding: 12px 26px;
        font-weight: 600;
        border-radius: 30px;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-size: 0.95rem;
        border: none;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        cursor: pointer;
        white-space: nowrap;
    }

    /* Primary Button - Orange Gradient */
    .home-btn-primary {
        background: linear-gradient(135deg, #ff6b35, #ff9a56);
        color: white;
    }

    .home-btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 30px rgba(255, 107, 53, 0.4);
        color: white;
        text-decoration: none;
    }

    /* Secondary Button - Semi-transparent White */
    .home-btn-secondary {
        background: rgba(255, 255, 255, 0.15);
        color: white;
        border: 1px solid rgba(255, 255, 255, 0.3);
    }

    .home-btn-secondary:hover {
        background: rgba(255, 255, 255, 0.25);
        transform: translateY(-2px);
        box-shadow: 0 10px 30px rgba(255, 255, 255, 0.2);
        color: white;
        text-decoration: none;
    }

    /* Login Links */
    .home-links {
        margin-top: 25px;
        font-size: 0.95rem;
        padding-top: 20px;
        border-top: 1px solid rgba(255, 255, 255, 0.1);
    }

    .home-links p {
        margin: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
    }

    .home-links a {
        color: #ffb88c;
        text-decoration: none;
        transition: all 0.3s ease;
        font-weight: 500;
    }

    .home-links a:hover {
        color: #fff;
        text-decoration: underline;
    }

    .divider {
        color: rgba(255, 255, 255, 0.5);
    }

    /* Animation */
    @keyframes slideInDown {
        from {
            opacity: 0;
            transform: translateY(-30px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    /* Responsive Design */
    @media (max-width: 768px) {
        .home-box {
            padding: 40px 30px;
            max-width: 90%;
        }

        .home-title {
            font-size: 2rem;
        }

        .home-subtitle {
            font-size: 0.95rem;
        }

        .home-buttons {
            flex-direction: column;
        }

        .home-btn {
            width: 100%;
            justify-content: center;
        }
    }
</style>
{% endblock content %}
