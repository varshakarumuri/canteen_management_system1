<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - E-Canteen</title>
    {% load static %}

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Segoe UI', sans-serif;
        }

        /* 🔥 Blurred Background - Same as Login */
        .bg-blur {
            position: fixed;
            width: 100%;
            height: 100%;
            background: url('{% static "images/food-bg.png" %}') center/cover no-repeat;
            filter: none;
            z-index: -2;
        }

        .bg-overlay {
            position: fixed;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: -1;
        }

        /* Center Layout */
        .login-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* 🌟 Glass Container */
        .login-box {
            width: 100%;
            max-width: 450px;
            padding: 40px;
            border-radius: 20px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            color: white;
            text-align: center;
        }

        .login-box h2 {
            margin-bottom: 10px;
            font-weight: 700;
        }

        .subtitle {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 25px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 5px;
            display: block;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            background: rgba(255, 255, 255, 0.9);
            color: #333;
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            border-radius: 30px;
            border: none;
            background: linear-gradient(135deg, #ff6b35, #ff9a56);
            color: white;
            font-weight: bold;
            margin-top: 10px;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 107, 53, 0.4);
        }

        .password-requirements {
            text-align: left;
            background: rgba(0, 0, 0, 0.2);
            padding: 15px;
            border-radius: 10px;
            font-size: 0.8rem;
            margin-bottom: 20px;
        }

        .password-requirements ul {
            margin: 5px 0 0 0;
            padding-left: 20px;
            color: #ffb88c;
        }

        .links {
            margin-top: 20px;
            font-size: 0.9rem;
        }

        .links a {
            color: #ffb88c;
            text-decoration: none;
            font-weight: 600;
        }

        .info-badge {
            background: rgba(52, 152, 219, 0.2);
            border: 1px solid rgba(52, 152, 219, 0.5);
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>

<div class="bg-blur"></div>
<div class="bg-overlay"></div>

<div class="login-wrapper">
    <div class="login-box">
        <h2><i ></i> Reset Password</h2>
        

        {% if error %}
            <div class="alert alert-danger" style="font-size: 0.85rem; border-radius: 10px;">
                <i class="fas fa-exclamation-circle"></i> {{ error }}
            </div>
        {% endif %}

        {% if otp_verified %}
            <div class="info-badge">
                <i class="fas fa-user-check"></i> Verified: <strong>{{ email }}</strong>
            </div>

            <form method="post">
                {% csrf_token %}
                <div class="form-group">
                    <label>New Password</label>
                    <input type="password" name="new_password" placeholder="Min. 8 characters" required>
                </div>

                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" name="confirm_password" placeholder="Repeat new password" required>
                </div>

                

                <button type="submit" class="login-btn">Update Password</button>
            </form>
        {% else %}
            <div class="alert alert-warning" style="background: rgba(243, 156, 18, 0.2); border: 1px solid #f39c12; color: #f39c12;">
                <i class="fas fa-shield-alt"></i> OTP verification required first.
            </div>
            <div class="links">
                <a href="{% url 'forgot_password_verify' %}" class="login-btn d-block text-center text-white" style="text-decoration: none;">Verify OTP Now</a>
            </div>
        {% endif %}

        <div class="links">
            <p><a href="{% url 'user_login' %}"><i class="fas fa-arrow-left"></i> Back to Login</a></p>
        </div>
    </div>
</div>

</body>
</html>
