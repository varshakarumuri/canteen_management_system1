<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Registration - E-Canteen</title>
    {% load static %}

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Segoe UI', sans-serif;
        }

        /* 🔥 Blurred Background - Matched to Login */
        .bg-blur {
            position: fixed;
            width: 100%;
            height: 100%;
            background: url('{% static "images/food-bg.png" %}') center/cover no-repeat;
            filter: blur(10px);
            z-index: -2;
        }

        .bg-overlay {
            position: fixed;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: -1;
        }

        /* Center Layout - Matched to Login */
        .register-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100%;
            padding: 40px 20px;
        }

        /* 🌟 Glass Container - Matched to Login */
        .register-box {
            width: 100%;
            max-width: 480px; /* Slightly wider to accommodate more fields */
            padding: 40px;
            border-radius: 20px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            color: white;
            text-align: center;
            animation: fadeIn 0.6s ease;
        }

        .register-box h2 {
            margin-bottom: 20px;
            font-weight: 700;
        }

        /* Email Display Tag */
        .email-tag {
            background: rgba(255, 255, 255, 0.15);
            padding: 8px 15px;
            border-radius: 10px;
            font-size: 0.85rem;
            display: inline-block;
            margin-bottom: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .form-group {
            margin-bottom: 18px;
            text-align: left;
        }

        .form-group label {
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 5px;
            display: block;
        }

        .form-group input, 
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            outline: none;
            background: white;
            color: #333;
            font-size: 0.95rem;
        }

        /* Registration Button - Matched to Login */
        .register-btn {
            width: 100%;
            padding: 12px;
            border-radius: 30px;
            border: none;
            background: linear-gradient(135deg, #ff6b35, #ff9a56);
            color: white;
            font-weight: bold;
            margin-top: 15px;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .register-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 107, 53, 0.4);
        }

        .links {
            margin-top: 25px;
            font-size: 0.9rem;
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 20px;
        }

        .links a {
            color: #ffb88c;
            text-decoration: none;
            font-weight: 600;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 480px) {
            .register-box { padding: 30px 20px; }
        }
    </style>
</head>

<body>

<div class="bg-blur"></div>
<div class="bg-overlay"></div>

<div class="register-wrapper">
    <div class="register-box">

        <h2><i class="fas fa-user-plus"></i> Join E-Canteen</h2>

        <div class="email-tag">
            <i class="fas fa-envelope"></i> Verified: <strong>{{ email }}</strong>
        </div>

        {% if error %}
            <div class="alert alert-danger" style="font-size: 0.85rem;">{{ error }}</div>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <input type="hidden" name="otp" value="{{ request.POST.otp }}">

            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="name" placeholder="John Doe" required>
            </div>

            <div class="form-group">
                <label>Phone Number</label>
                <input type="text" name="phone" placeholder="+91 XXXXX XXXXX" required>
            </div>

            <div class="form-group">
                <label>Delivery Address</label>
                <textarea name="address" rows="2" placeholder="Your street address..." required></textarea>
            </div>

            <div class="form-group">
                <label>Create Password</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="register-btn">Create Account</button>
        </form>

        <div class="links">
            <p>Already have an account? 
                <a href="{% url 'user_login' %}">Login here</a>
            </p>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
