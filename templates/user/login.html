<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Login - E-Canteen</title>
    {% load static %}

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Segoe UI', sans-serif;
        }

        /* 🔥 Blurred Background */
        .bg-blur {
            position: fixed;
            width: 100%;
            height: 100%;
            background: url('{% static "images/food-bg.png" %}') center/cover no-repeat;
            filter: blur(10px);
            z-index: -2;
        }

        .bg-overlay {
            position: fixed;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: -1;
        }

        /* Center Layout */
        .login-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
        }

        /* 🌟 Glass Container */
        .login-box {
            width: 100%;
            max-width: 420px;
            padding: 40px;
            border-radius: 20px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            color: white;
            text-align: center;
        }

        .login-box h2 {
            margin-bottom: 25px;
            font-weight: 700;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            font-weight: 600;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            margin-top: 5px;
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            border-radius: 30px;
            border: none;
            background: linear-gradient(135deg, #ff6b35, #ff9a56);
            color: white;
            font-weight: bold;
            margin-top: 10px;
            transition: 0.3s;
        }

        .login-btn:hover {
            transform: translateY(-2px);
        }

        .links {
            margin-top: 20px;
            font-size: 0.9rem;
        }

        .links a {
            color: #ffb88c;
            text-decoration: none;
        }

    </style>
</head>

<body>

<div class="bg-blur"></div>
<div class="bg-overlay"></div>

<div class="login-wrapper">
    <div class="login-box">

        <h2><i class="fas fa-user-circle"></i> User Login</h2>

        {% if error %}
            <div class="alert alert-danger">{{ error }}</div>
        {% endif %}

        {% if message %}
            <div class="alert alert-success">{{ message }}</div>
        {% endif %}

        <form method="post">
            {% csrf_token %}

            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" required>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" required>
            </div>

            <button class="login-btn">Login</button>
        </form>

        <div class="links">
            <p>Don't have an account? 
                <a href="{% url 'verify_email' %}">Register</a>
            </p>
            <p>
                <a href="{% url 'forgot_password_verify' %}">Forgot Password?</a>
            </p>
        </div>

    </div>
</div>

</body>
</html>
